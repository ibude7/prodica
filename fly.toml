# Fly.io: `fly launch` (uses Dockerfile) then `fly deploy`
# https://fly.io/docs/reference/configuration/

app = "prodica"
primary_region = "iad"

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
