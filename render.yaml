# Render Blueprint: https://render.com/docs/infrastructure-as-code
# Dashboard → New → Blueprint → connect this repository (or paste the repo URL).

services:
  - type: web
    name: prodica
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
