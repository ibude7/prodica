# Render Blueprint: https://render.com/docs/infrastructure-as-code

services:
  - type: web
    name: prodica
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLOUD_PROJECT
        value: prodica1
      - key: GOOGLE_CLOUD_LOCATION
        value: global
      - key: GEMINI_MODEL
        value: gemini-3.5-flash
      - key: GEMINI_FALLBACK_MODEL
        value: gemini-2.5-flash
      # Paste ADC or service-account JSON (Dashboard → Environment).
      # Authorized-user ADC from: gcloud auth application-default login
      - key: GOOGLE_APPLICATION_CREDENTIALS_JSON
        sync: false
